    <p class="about-text">Cléa Vincent est une musicienne et chanteuse française, née en 1985 à Paris. Elle est active depuis le début des années 2010, et se présente comme auteure-compositrice-interprète, avec une place centrale donnée aux claviers/piano.</p>
